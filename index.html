<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Reader</title>
  <meta name="description" content="Your personal read-later app" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #22223b;
      --accent: #e07b54; --accent2: #7c6af5; --text: #e8e8f0;
      --text-muted: #888899; --border: #2a2a3e; --tag-bg: #2a2a3e;
      --success: #4caf82; --radius: 10px;
      --font-body: 'Inter', sans-serif; --font-display: 'Lora', serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; font-size: 15px; line-height: 1.6; }
    #app { display: flex; flex-direction: column; min-height: 100vh; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .logo { font-family: var(--font-display); font-size: 1.3rem; color: var(--accent); letter-spacing: -0.5px; }
    .logo span { color: var(--text-muted); font-style: italic; font-size: 0.85rem; margin-left: 6px; }
    nav { display: flex; gap: 4px; }
    nav button { background: none; border: none; color: var(--text-muted); font-family: var(--font-body); font-size: 0.85rem; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
    nav button.active, nav button:hover { background: var(--surface2); color: var(--text); }
    nav button.active { color: var(--accent); }
    main { flex: 1; padding: 24px 20px; max-width: 900px; margin: 0 auto; width: 100%; }
    .save-bar { display: flex; gap: 10px; margin-bottom: 28px; }
    .save-bar input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font-body); font-size: 0.9rem; padding: 10px 14px; outline: none; transition: border-color 0.15s; }
    .save-bar input:focus { border-color: var(--accent2); }
    .save-bar input::placeholder { color: var(--text-muted); }
    .btn { background: var(--accent); border: none; border-radius: var(--radius); color: #fff; cursor: pointer; font-family: var(--font-body); font-size: 0.9rem; font-weight: 600; padding: 10px 18px; transition: opacity 0.15s, transform 0.1s; white-space: nowrap; }
    .btn:hover { opacity: 0.88; } .btn:active { transform: scale(0.97); } .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn.secondary { background: var(--surface2); color: var(--text); }
    .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .filter-tag { background: var(--tag-bg); border: 1px solid var(--border); border-radius: 20px; color: var(--text-muted); cursor: pointer; font-size: 0.8rem; padding: 4px 12px; transition: all 0.15s; }
    .filter-tag.active, .filter-tag:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }
    .search-input { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; color: var(--text); font-family: var(--font-body); font-size: 0.8rem; padding: 4px 14px; outline: none; margin-left: auto; width: 180px; transition: border-color 0.15s; }
    .search-input:focus { border-color: var(--accent2); }
    .search-input::placeholder { color: var(--text-muted); }
    .articles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; overflow: hidden; transition: border-color 0.15s, transform 0.15s; display: flex; flex-direction: column; }
    .card:hover { border-color: var(--accent2); transform: translateY(-2px); }
    .card.read { opacity: 0.55; }
    .card-image { width: 100%; height: 140px; background: var(--surface2); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 2rem; overflow: hidden; }
    .card-image img { width: 100%; height: 100%; object-fit: cover; }
    .card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .card-title { font-family: var(--font-display); font-size: 1rem; font-weight: 600; line-height: 1.35; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-domain { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
    .card-excerpt { font-size: 0.82rem; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-top: 1px solid var(--border); gap: 8px; }
    .card-tags { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
    .tag { background: var(--tag-bg); border-radius: 4px; color: var(--text-muted); font-size: 0.7rem; padding: 2px 7px; }
    .card-actions { display: flex; gap: 6px; }
    .icon-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; padding: 4px; border-radius: 4px; transition: color 0.15s, background 0.15s; line-height: 1; }
    .icon-btn:hover { color: var(--text); background: var(--surface2); }
    .icon-btn.active { color: var(--accent); }
    .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 16px; }
    .empty h3 { font-family: var(--font-display); font-size: 1.2rem; color: var(--text); margin-bottom: 8px; }
    .empty p { font-size: 0.9rem; }
    #reader-view { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 200; overflow-y: auto; }
    #reader-view.open { display: block; }
    .reader-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 10; }
    .reader-header .back-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.4rem; line-height: 1; padding: 4px; transition: color 0.15s; }
    .reader-header .back-btn:hover { color: var(--text); }
    .reader-meta { flex: 1; min-width: 0; }
    .reader-meta .r-domain { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
    .reader-meta .r-title { font-family: var(--font-display); font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .reader-actions { display: flex; gap: 8px; }
    .reader-content { max-width: 680px; margin: 0 auto; padding: 40px 24px 80px; }
    .reader-content h1 { font-family: var(--font-display); font-size: 1.9rem; line-height: 1.25; margin-bottom: 16px; color: var(--text); }
    .reader-content .byline { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
    .reader-content .article-body { font-size: 1.05rem; line-height: 1.85; color: #d0d0e0; }
    .reader-content .article-body p { margin-bottom: 1.2em; }
    .reader-content .article-body h2, .reader-content .article-body h3 { font-family: var(--font-display); color: var(--text); margin: 1.5em 0 0.6em; }
    .reader-content .article-body a { color: var(--accent2); text-decoration: none; }
    .reader-content .article-body a:hover { text-decoration: underline; }
    .reader-content .article-body img { max-width: 100%; border-radius: 8px; margin: 1em 0; }
    .reader-content .article-body blockquote { border-left: 3px solid var(--accent); margin: 1.2em 0; padding: 4px 0 4px 18px; color: var(--text-muted); font-style: italic; }
    .reader-source { margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--text-muted); }
    .reader-source a { color: var(--accent2); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; width: 380px; max-width: 90vw; }
    .modal h3 { font-family: var(--font-display); margin-bottom: 16px; }
    .tag-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .tag-input-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font-body); font-size: 0.9rem; padding: 8px 12px; outline: none; }
    .current-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; min-height: 28px; }
    .current-tags .tag { cursor: pointer; transition: background 0.15s; display: flex; align-items: center; gap: 4px; }
    .current-tags .tag:hover { background: #c0392b; color: #fff; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.85rem; padding: 10px 18px; opacity: 0; pointer-events: none; transition: all 0.25s; z-index: 999; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: #c0392b; color: #e74c3c; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 600px) {
      header { padding: 0 14px; } main { padding: 16px 14px; }
      .articles-grid { grid-template-columns: 1fr; } .save-bar { flex-direction: column; }
      .reader-content { padding: 24px 16px 60px; } .reader-content h1 { font-size: 1.4rem; }
      .search-input { width: 130px; }
    }
    .view { display: none; } .view.active { display: block; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">My Reader <span>/ save & read</span></div>
    <nav>
      <button class="active" data-view="home" onclick="switchView('home', this)">📚 Saved</button>
      <button data-view="favourites" onclick="switchView('favourites', this)">★ Favourites</button>
      <button data-view="archived" onclick="switchView('archived', this)">✓ Archived</button>
    </nav>
  </header>
  <main>
    <div id="view-home" class="view active">
      <div class="save-bar">
        <input type="url" id="url-input" placeholder="Paste a URL to save…" onkeydown="if(event.key==='Enter') saveArticle()" />
        <button class="btn" id="save-btn" onclick="saveArticle()">Save</button>
      </div>
      <div class="filters" id="tag-filters">
        <span class="filter-tag active" data-tag="all" onclick="filterByTag('all', this)">All</span>
        <input class="search-input" id="search-input" type="text" placeholder="Search…" oninput="renderArticles()" />
      </div>
      <div class="articles-grid" id="articles-container">
        <div class="empty"><div class="empty-icon">📖</div><h3>Nothing saved yet</h3><p>Paste a URL above to save your first article.</p></div>
      </div>
    </div>
    <div id="view-favourites" class="view"><div class="articles-grid" id="fav-container"></div></div>
    <div id="view-archived" class="view"><div class="articles-grid" id="arc-container"></div></div>
  </main>
</div>

<div id="reader-view">
  <div class="reader-header">
    <button class="back-btn" onclick="closeReader()">←</button>
    <div class="reader-meta">
      <div class="r-domain" id="r-domain"></div>
      <div class="r-title" id="r-title-header"></div>
    </div>
    <div class="reader-actions">
      <button class="icon-btn" id="r-fav-btn" title="Favourite" onclick="toggleReaderFav()">☆</button>
      <button class="icon-btn" title="Open original" onclick="openOriginal()">↗</button>
      <button class="icon-btn" title="Archive" onclick="archiveFromReader()">✓</button>
    </div>
  </div>
  <div class="reader-content">
    <h1 id="r-title"></h1>
    <div class="byline" id="r-byline"></div>
    <div class="article-body" id="r-body"></div>
    <div class="reader-source">Read full article: <a id="r-source-link" href="#" target="_blank" rel="noopener">original source ↗</a></div>
  </div>
</div>

<div class="modal-overlay" id="tag-modal">
  <div class="modal">
    <h3>Edit tags</h3>
    <div class="tag-input-row">
      <input type="text" id="new-tag-input" placeholder="Add a tag…" onkeydown="if(event.key==='Enter') addTag()" />
      <button class="btn" onclick="addTag()">Add</button>
    </div>
    <div class="current-tags" id="current-tags-display"></div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeTagModal()">Cancel</button>
      <button class="btn" onclick="saveTagsFromModal()">Save tags</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
  import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCA3uEIOscPIYaXWA7E2Ppeje7aypMptXE",
    authDomain: "my-reader-23547.firebaseapp.com",
    projectId: "my-reader-23547",
    storageBucket: "my-reader-23547.firebasestorage.app",
    messagingSenderId: "521154548973",
    appId: "1:521154548973:web:e9d38bc8502a6e1277e8e4"
  };

  const DIFFBOT_TOKEN = "75d55e35c176214893d1b75f01678dc9";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const COL = "articles";

  window._articles = [];
  window._activeTag = "all";
  window._currentReaderId = null;
  window._editingTagsId = null;
  window._editingTags = [];

  const q = query(collection(db, COL), orderBy("savedAt", "desc"));
  onSnapshot(q, snap => {
    window._articles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderAll();
  });

  // ── Diffbot article extraction ──
  async function fetchArticleData(url) {
    // Step 1: Try Diffbot for full content
    try {
      const apiUrl = `https://api.diffbot.com/v3/article?token=${DIFFBOT_TOKEN}&url=${encodeURIComponent(url)}&paging=false`;
      const res = await fetch(apiUrl, { signal: AbortSignal.timeout(15000) });
      if (res.ok) {
        const json = await res.json();
        if (json.objects && json.objects.length > 0) {
          const obj = json.objects[0];
          const title = obj.title || "";
          const text = obj.text || "";
          const html = obj.html || "";
          const image = obj.images?.[0]?.url || "";
          // Only use Diffbot result if we got meaningful content
          if (title || text.length > 50) {
            return {
              title,
              excerpt: text ? text.substring(0, 220) + (text.length > 220 ? "…" : "") : "",
              image,
              content: html || `<p>${text}</p>`,
              author: obj.author || "",
              date: obj.date || "",
              partial: text.length < 200
            };
          }
        }
      }
    } catch(e) { console.warn("Diffbot failed:", e.message); }

    // Step 2: Fallback — scrape Open Graph meta tags via proxy
    // These are always public even on paywalled sites
    try {
      const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
      const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(10000) });
      const json = await res.json();
      if (json.contents && json.contents.length > 200) {
        const parser = new DOMParser();
        const doc2 = parser.parseFromString(json.contents, "text/html");
        const get = (sel, attr) => doc2.querySelector(sel)?.getAttribute(attr) || "";
        const title =
          get('meta[property="og:title"]', 'content') ||
          get('meta[name="twitter:title"]', 'content') ||
          doc2.querySelector('title')?.textContent || "";
        const excerpt =
          get('meta[property="og:description"]', 'content') ||
          get('meta[name="description"]', 'content') ||
          get('meta[name="twitter:description"]', 'content') || "";
        const image =
          get('meta[property="og:image"]', 'content') ||
          get('meta[name="twitter:image"]', 'content') || "";
        if (title) {
          return {
            title: title.trim(),
            excerpt: excerpt.trim(),
            image: image.trim(),
            content: excerpt ? `<p>${excerpt.trim()}</p><p style="color:var(--text-muted);font-style:italic;margin-top:1.5em">This is a paywalled article. Only the introduction is available here.</p>` : "",
            author: "",
            date: "",
            partial: true
          };
        }
      }
    } catch(e) { console.warn("OG fallback failed:", e.message); }

    throw new Error("Could not extract any content");
  }

  window.saveArticle = async function () {
    const input = document.getElementById("url-input");
    const btn = document.getElementById("save-btn");
    let url = input.value.trim();
    if (!url) return;
    if (!url.startsWith("http")) url = "https://" + url;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    let articleData = { title: "", excerpt: "", image: "", content: "", author: "", date: "" };
    let fetchSuccess = false;

    try {
      articleData = await fetchArticleData(url);
      fetchSuccess = true;
    } catch(e) {
      console.warn("Extraction failed:", e.message);
    }

    await addDoc(collection(db, COL), {
      url,
      title: articleData.title || getDomain(url),
      excerpt: articleData.excerpt || "",
      image: articleData.image || "",
      content: articleData.content || "",
      author: articleData.author || "",
      date: articleData.date || "",
      domain: getDomain(url),
      tags: [],
      favourite: false,
      archived: false,
      read: false,
      fetchSuccess,
      savedAt: Date.now()
    });

    input.value = "";
    showToast(fetchSuccess ? "Article saved ✓" : "URL saved (content unavailable)", fetchSuccess ? "success" : "");
    btn.disabled = false;
    btn.textContent = "Save";
  };

  window.renderAll = function () { renderArticles(); renderFavourites(); renderArchived(); renderTagFilters(); };

  window.renderArticles = function () {
    const container = document.getElementById("articles-container");
    const search = document.getElementById("search-input")?.value.toLowerCase() || "";
    let items = window._articles.filter(a => !a.archived);
    if (window._activeTag !== "all") items = items.filter(a => a.tags?.includes(window._activeTag));
    if (search) items = items.filter(a =>
      (a.title||"").toLowerCase().includes(search) ||
      (a.excerpt||"").toLowerCase().includes(search) ||
      (a.domain||"").toLowerCase().includes(search)
    );
    container.innerHTML = items.length ? items.map(cardHTML).join("") : emptyHTML("No saved articles", "Paste a URL above to get started.");
  };

  window.renderFavourites = function () {
    const c = document.getElementById("fav-container");
    const items = window._articles.filter(a => a.favourite && !a.archived);
    c.innerHTML = items.length ? items.map(cardHTML).join("") : emptyHTML("No favourites yet", "Star an article to find it here.");
  };

  window.renderArchived = function () {
    const c = document.getElementById("arc-container");
    const items = window._articles.filter(a => a.archived);
    c.innerHTML = items.length ? items.map(cardHTML).join("") : emptyHTML("Archive is empty", "Mark articles as done to archive them.");
  };

  window.renderTagFilters = function () {
    const allTags = [...new Set(window._articles.flatMap(a => a.tags || []))].sort();
    const container = document.getElementById("tag-filters");
    container.innerHTML = `
      <span class="filter-tag ${window._activeTag==="all"?"active":""}" data-tag="all" onclick="filterByTag('all',this)">All</span>
      ${allTags.map(t=>`<span class="filter-tag ${window._activeTag===t?"active":""}" data-tag="${t}" onclick="filterByTag('${t}',this)">${t}</span>`).join("")}
      <input class="search-input" type="text" placeholder="Search…" oninput="renderArticles()" />`;
    container.querySelector(".search-input").addEventListener("input", renderArticles);
  };

  function cardHTML(a) {
    const img = a.image
      ? `<div class="card-image"><img src="${a.image}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='📄'" /></div>`
      : `<div class="card-image">📄</div>`;
    const tags = (a.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("");
    const noContent = !a.fetchSuccess ? `<div style="font-size:0.72rem;color:var(--accent);margin-top:4px">⚠ Opens original site</div>` : "";
    return `
      <div class="card ${a.read?"read":""}" onclick="openReader('${a.id}')">
        ${img}
        <div class="card-body">
          <div class="card-domain">${a.domain||""}</div>
          <div class="card-title">${escHtml(a.title||a.url)}</div>
          ${a.excerpt?`<div class="card-excerpt">${escHtml(a.excerpt)}</div>`:""}
          ${noContent}
        </div>
        <div class="card-footer">
          <div class="card-tags">${tags}</div>
          <div class="card-actions" onclick="event.stopPropagation()">
            <button class="icon-btn ${a.favourite?"active":""}" title="Favourite" onclick="toggleFav('${a.id}')">${a.favourite?"★":"☆"}</button>
            <button class="icon-btn" title="Tags" onclick="openTagModal('${a.id}')">🏷</button>
            <button class="icon-btn" title="Archive" onclick="archiveArticle('${a.id}')">${a.archived?"↩":"✓"}</button>
            <button class="icon-btn" title="Delete" onclick="deleteArticle('${a.id}')">🗑</button>
          </div>
        </div>
      </div>`;
  }

  function emptyHTML(title, sub) {
    return `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📭</div><h3>${title}</h3><p>${sub}</p></div>`;
  }

  window.openReader = async function (id) {
    const a = window._articles.find(x => x.id === id);
    if (!a) return;
    window._currentReaderId = id;

    document.getElementById("r-domain").textContent = a.domain || "";
    document.getElementById("r-title-header").textContent = a.title || a.url;
    document.getElementById("r-title").textContent = a.title || a.url;
    const bylineParts = [a.author, a.date].filter(Boolean);
    document.getElementById("r-byline").textContent = bylineParts.length ? bylineParts.join(" · ") : (a.domain ? `From ${a.domain}` : "");
    document.getElementById("r-fav-btn").textContent = a.favourite ? "★" : "☆";
    document.getElementById("r-fav-btn").classList.toggle("active", !!a.favourite);
    document.getElementById("r-source-link").href = a.url;

    const body = document.getElementById("r-body");
    if (a.content && a.content.length > 100) {
      body.innerHTML = a.content;
      body.querySelectorAll("script,style,iframe").forEach(el => el.remove());
    } else {
      body.innerHTML = `
        <p style="color:var(--text-muted);margin-bottom:16px">Full article content could not be extracted — this happens with paywalled or heavily JavaScript-rendered pages.</p>
        <a href="${escHtml(a.url)}" target="_blank" rel="noopener"
           style="display:inline-block;background:var(--accent);color:#fff;padding:10px 18px;border-radius:8px;text-decoration:none;font-weight:600">
          Read on original site ↗
        </a>`;
    }

    document.getElementById("reader-view").classList.add("open");
    document.body.style.overflow = "hidden";
    if (!a.read) await updateDoc(doc(db, COL, id), { read: true });
  };

  window.closeReader = function () {
    document.getElementById("reader-view").classList.remove("open");
    document.body.style.overflow = "";
    window._currentReaderId = null;
  };

  window.toggleReaderFav = async function () {
    if (!window._currentReaderId) return;
    const a = window._articles.find(x => x.id === window._currentReaderId);
    if (a) await updateDoc(doc(db, COL, window._currentReaderId), { favourite: !a.favourite });
  };

  window.openOriginal = function () {
    const a = window._articles.find(x => x.id === window._currentReaderId);
    if (a) window.open(a.url, "_blank", "noopener");
  };

  window.archiveFromReader = async function () {
    if (!window._currentReaderId) return;
    await updateDoc(doc(db, COL, window._currentReaderId), { archived: true });
    closeReader();
    showToast("Archived ✓", "success");
  };

  window.toggleFav = async function (id) {
    const a = window._articles.find(x => x.id === id);
    if (a) await updateDoc(doc(db, COL, id), { favourite: !a.favourite });
  };

  window.archiveArticle = async function (id) {
    const a = window._articles.find(x => x.id === id);
    if (!a) return;
    await updateDoc(doc(db, COL, id), { archived: !a.archived });
    showToast(a.archived ? "Restored ✓" : "Archived ✓", "success");
  };

  window.deleteArticle = async function (id) {
    if (!confirm("Delete this article?")) return;
    await deleteDoc(doc(db, COL, id));
    showToast("Deleted", "");
  };

  window.openTagModal = function (id) {
    const a = window._articles.find(x => x.id === id);
    if (!a) return;
    window._editingTagsId = id;
    window._editingTags = [...(a.tags||[])];
    renderCurrentTags();
    document.getElementById("new-tag-input").value = "";
    document.getElementById("tag-modal").classList.add("open");
  };

  window.closeTagModal = function () { document.getElementById("tag-modal").classList.remove("open"); };

  window.addTag = function () {
    const input = document.getElementById("new-tag-input");
    const val = input.value.trim().toLowerCase();
    if (val && !window._editingTags.includes(val)) { window._editingTags.push(val); renderCurrentTags(); }
    input.value = ""; input.focus();
  };

  function renderCurrentTags() {
    document.getElementById("current-tags-display").innerHTML =
      window._editingTags.map(t=>`<span class="tag" onclick="removeTag('${t}')">${t} ×</span>`).join("");
  }

  window.removeTag = function (t) { window._editingTags = window._editingTags.filter(x=>x!==t); renderCurrentTags(); };

  window.saveTagsFromModal = async function () {
    if (!window._editingTagsId) return;
    await updateDoc(doc(db, COL, window._editingTagsId), { tags: window._editingTags });
    closeTagModal();
    showToast("Tags saved ✓", "success");
  };

  window.filterByTag = function (tag, el) {
    window._activeTag = tag;
    document.querySelectorAll(".filter-tag").forEach(t=>t.classList.remove("active"));
    el.classList.add("active");
    renderArticles();
  };

  window.switchView = function (view, btn) {
    document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
    document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
    document.getElementById("view-"+view).classList.add("active");
    btn.classList.add("active");
  };

  function getDomain(url) { try { return new URL(url).hostname.replace("www.",""); } catch { return ""; } }
  function escHtml(str) { return (str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

  let toastTimer;
  window.showToast = function (msg, type) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast show" + (type?" "+type:"");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>t.classList.remove("show"), 2800);
  };

  document.addEventListener("keydown", e => {
    if (e.key==="Escape") {
      if (document.getElementById("tag-modal").classList.contains("open")) closeTagModal();
      else if (document.getElementById("reader-view").classList.contains("open")) closeReader();
    }
  });
  document.getElementById("tag-modal").addEventListener("click", function(e) { if(e.target===this) closeTagModal(); });
</script>
</body>
</html>
